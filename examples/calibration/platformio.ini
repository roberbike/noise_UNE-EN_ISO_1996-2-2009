; Firmware de calibración para el nodo de ruido (ESP32-C3).
; Misma cadena de medida que src/main.cpp: ADC + ponderación A + RMS.
; Uso: flashear en el nodo sensor, abrir Monitor Serie 115200, aplicar
; calibrador 94 dB y anotar RMS (mV). Ver docs/CALIBRACION.md.

[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
